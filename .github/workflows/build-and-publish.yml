# This workflow will build a docker container, publish it to Google Container
# Registry

name: 'Build and Publish to registry'

on:
  push:
    branches: [ "main" ]

env:
  PROJECT_ID: 'nestosoft-web'
  REGION: 'europe-west2' 
  GAR_LOCATION: 'europe-west2-docker.pkg.dev/nestosoft-devops/nestosoft-web'

jobs:
   
  build-push-artifact:
    # https://vishalbulbule.medium.com/create-github-actions-self-hosted-runner-on-google-cloud-6ae15d62c742
    runs-on: ubuntu-latest
    
    steps:
      - name: "Checkout"
        uses: "actions/checkout@v3"
        
      - id: "auth"
        uses: "google-github-actions/auth@v1"
        with:
          credentials_json: "${{ secrets.SERVICE_ACCOUNT_KEY }}"
          
      - name: "Set up Cloud SDK"
        uses: "google-github-actions/setup-gcloud@v1"
        
      - name: "Use gcloud CLI"
        run: "gcloud info"
        
      - name: "Docker auth"
        run: |-
          gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet
      
      #- name: Build image
      #  run: docker build . --file ./infrastructure/docker/Dockerfile --target dev --tag ${{ env.GAR_LOCATION }}

      - id: get-tag
        name: Get tag
        run: echo ::set-output name=short_ref::${GITHUB_REF#refs/*/}

      - id: docker-push-tagged
        name: Tag Docker image and push to Google Artifact Registry
        uses: docker/build-push-action@v6
        with:
          target: production
          file: ./infrastructure/docker/Dockerfile
          push: true
          tags: |
             ${{ env.GAR_LOCATION }}/nestosoft-web:${{ steps.get-tag.outputs.short_ref }}
             ${{ env.GAR_LOCATION }}/nestosoft-web:latest
